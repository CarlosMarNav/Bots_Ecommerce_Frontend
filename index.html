<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOT CONTROL — SendingBay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sendingbay-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5/ansi_up.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 135, 115, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 135, 115, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 272px 1fr;
      grid-template-rows: 64px 1fr;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--color-border-secondary);
      background: var(--color-bg-primary);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-img {
      height: 28px;
      width: auto;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--color-border-primary);
      flex-shrink: 0;
    }

    .header-title {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: 3px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
    }

    .header-sep { flex: 1; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: var(--radius-md);
      transition: background 0.1s;
    }
    .theme-btn:hover { background: var(--color-bg-tertiary); }

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--color-border-secondary);
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--color-bg-primary);
    }

    .sidebar-label {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: 3px;
      color: var(--color-text-quaternary);
      text-transform: uppercase;
      padding: 10px 6px 6px;
    }

    .run-item {
      padding: 10px 12px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-bg-primary);
    }
    .run-item:hover { border-color: var(--color-border-primary); background: var(--color-bg-secondary); }
    .run-item.active { border-color: var(--color-brand-600); background: var(--color-brand-25); }

    .run-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-running  { background: var(--color-brand-500); animation: pulse 1s infinite; }
    .dot-completed { background: var(--color-success-500); }
    .dot-failed   { background: var(--color-error-600); }
    .dot-stopped  { background: var(--color-warning-600); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .run-item-info { flex: 1; min-width: 0; }
    .run-item-name { font-weight: var(--font-weight-medium); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-text-primary); }
    .run-item-meta { color: var(--color-text-quaternary); font-size: 10px; margin-top: 2px; }

    /* ── MAIN ────────────────────────────────────────────────── */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      letter-spacing: 2px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border-secondary);
    }

    /* ── BOT CARDS ────────────────────────────────────────────── */
    .bot-selector-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .bot-select-card {
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--radius-xl);
      padding: 18px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--color-bg-primary);
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
    }
    .bot-select-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color, var(--color-brand-600));
      opacity: 0;
      transition: opacity 0.15s;
    }
    .bot-select-card:hover { border-color: var(--color-border-primary); background: var(--color-bg-secondary); box-shadow: var(--shadow-sm); }
    .bot-select-card:hover::after { opacity: 0.5; }
    .bot-select-card.selected { border-color: var(--card-color, var(--color-brand-600)); background: var(--color-bg-secondary); }
    .bot-select-card.selected::after { opacity: 1; }
    .bot-select-card.unavailable { opacity: 0.35; cursor: not-allowed; }

    .bot-select-icon { font-size: 28px; margin-bottom: 8px; }
    .bot-select-name { font-size: var(--text-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }

    .bot-select-check {
      position: absolute;
      top: 8px; right: 8px;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 1px solid var(--color-border-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: transparent;
      transition: all 0.15s;
    }
    .bot-select-card.selected .bot-select-check {
      background: var(--card-color, var(--color-brand-600));
      border-color: var(--card-color, var(--color-brand-600));
      color: #fff;
    }

    /* ── CONFIG ──────────────────────────────────────────────── */
    .config-grid {
      display: grid;
      grid-template-columns: 240px;
      gap: 14px;
    }

    /* ── LAUNCH BUTTON (full-width override) ─────────────────── */
    .launch-btn-wrap .btn {
      width: 100%;
      justify-content: center;
      height: 48px;
      font-size: var(--text-md);
      letter-spacing: 2px;
    }

    /* ── RUN INFO BAR ────────────────────────────────────────── */
    .run-info-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      padding: 12px 16px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--radius-xl);
      background: var(--color-bg-primary);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      box-shadow: var(--shadow-xs);
    }
    .run-info-field { display: flex; align-items: center; gap: 6px; }
    .run-info-key { color: var(--color-text-quaternary); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
    .run-info-val { color: var(--color-text-primary); font-weight: var(--font-weight-medium); }

    /* Status badge overrides for run-info-bar */
    .status-badge-running  { background: var(--color-brand-50); color: var(--color-brand-700); border: 1px solid var(--color-brand-200); }
    .status-badge-completed { background: var(--color-success-50); color: var(--color-success-700); border: 1px solid var(--color-success-200); }
    .status-badge-failed   { background: var(--color-error-50,#fee2e2); color: var(--color-error-700,#b91c1c); border: 1px solid var(--color-error-200,#fecaca); }
    .status-badge-stopped  { background: var(--color-warning-50); color: var(--color-warning-700); border: 1px solid var(--color-warning-200); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 10px; border-radius: var(--radius-full);
      font-size: 11px; font-weight: var(--font-weight-medium);
      font-family: var(--font-mono);
    }

    /* ── TERMINAL ─────────────────────────────────────────────── */
    .terminal {
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: #0d1117;
      box-shadow: var(--shadow-lg);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .terminal-dots { display: flex; gap: 6px; }
    .terminal-dot  { width: 12px; height: 12px; border-radius: 50%; }

    .terminal-title {
      flex: 1;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: #7d8590;
    }

    .terminal-actions { display: flex; gap: 6px; }

    .term-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: #7d8590;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .term-btn:hover { background: rgba(255,255,255,0.12); color: #e6edf3; }
    .term-btn.stop  { color: #f85149; border-color: rgba(248,81,73,0.3); }
    .term-btn.stop:hover { background: rgba(248,81,73,0.1); }

    .terminal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      color: #e6edf3;
      min-height: 280px;
      max-height: 500px;
    }

    .terminal-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      color: #3d444d;
      font-size: var(--text-sm);
    }
    .terminal-empty-icon { font-size: 32px; }

    .log-line { display: flex; gap: 12px; margin-bottom: 2px; }
    .log-time  { color: #3d444d; flex-shrink: 0; font-size: 11px; padding-top: 1px; }
    .log-text  { flex: 1; word-break: break-all; }
    .log-text.error  { color: #f85149; }
    .log-text.warn   { color: #e3b341; }
    .log-text.system { color: #58a6ff; }

    /* ── EMPTY STATE ─────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 280px;
      color: var(--color-text-quaternary);
      text-align: center;
    }
    .empty-state-icon  { font-size: 40px; opacity: 0.4; }
    .empty-state-title { font-size: var(--text-sm); font-weight: var(--font-weight-semibold); letter-spacing: 3px; color: var(--color-text-tertiary); }
    .empty-state-sub   { font-size: var(--text-xs); color: var(--color-text-quaternary); }

    /* ── TOAST ───────────────────────────────────────────────── */
    /* Using library .toast-stack classes — just position it */

    /* ── DARK MODE ────────────────────────────────────────────── */
    .dark-mode body { background: var(--color-bg-secondary); }
  </style>
</head>
<body>
<div class="layout">

  <!-- HEADER -->
  <header>
    <a class="header-logo" href="#">
      <img class="logo-img" src="logo-sendingbay.png" alt="SendingBay" style="filter: brightness(1.05);" />
    </a>
    <div class="header-divider"></div>
    <span class="header-title">Bot Control</span>
    <div class="header-sep"></div>
    <div class="header-actions">
      <span id="server-status" class="badge badge--brand">
        <span class="badge__dot"></span>
        CONECTADO
      </span>
      <span id="active-count" class="badge badge--default">0 ACTIVOS</span>
      <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☀️</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">Ejecuciones</div>
    <div id="runs-list">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--color-text-quaternary); padding: 8px 6px;">
        Sin ejecuciones aún
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="panel">

      <!-- Bot selector -->
      <div class="section-title">Seleccionar Bot</div>
      <div class="bot-selector-grid" id="bot-grid">
        <!-- Bots injected via JS -->
      </div>

      <!-- Config -->
      <div class="section-title">Configuración</div>
      <div class="config-grid">
        <div class="number-input">
          <label class="number-input__label" for="orders-input">Número de Orders</label>
          <div class="number-input__wrapper">
            <button class="number-input__btn" onclick="stepOrders(-1)" type="button">−</button>
            <input class="number-input__input" type="number" id="orders-input" value="10" min="1" max="999" />
            <button class="number-input__btn number-input__btn--right" onclick="stepOrders(1)" type="button">+</button>
          </div>
        </div>
      </div>

      <!-- Launch -->
      <div class="launch-btn-wrap">
        <button class="btn btn--primary btn--lg" id="launch-btn" onclick="launchBot()" disabled>
          <span class="btn__label">▶ INICIAR BOT</span>
        </button>
      </div>

      <!-- Run view -->
      <div id="run-view">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">⚡</div>
          <div class="empty-state-title">SELECCIONA UN BOT</div>
          <div class="empty-state-sub">Y pulsa iniciar para lanzar una ejecución</div>
        </div>

        <!-- Active run view -->
        <div id="active-run-view" style="display:none; flex-direction: column; gap: 12px;">
          <div class="section-title">Salida en tiempo real</div>
          <div class="run-info-bar" id="run-info-bar"></div>
          <div class="terminal">
            <div class="terminal-header">
              <div class="terminal-dots">
                <div class="terminal-dot" style="background:#ff6057"></div>
                <div class="terminal-dot" style="background:#ffbd2e"></div>
                <div class="terminal-dot" style="background:#28c840"></div>
              </div>
              <div class="terminal-title" id="terminal-title">bash — python main.py</div>
              <div class="terminal-actions">
                <button class="term-btn" onclick="clearTerminal()">LIMPIAR</button>
                <button class="term-btn" onclick="scrollTerminal()">↓ BAJAR</button>
                <button class="term-btn stop" id="stop-btn" onclick="stopCurrentRun()" style="display:none;">■ DETENER</button>
              </div>
            </div>
            <div class="terminal-body" id="terminal-body">
              <div class="terminal-empty">
                <div class="terminal-empty-icon">⬛</div>
                <span>Esperando salida...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Toast stack -->
<div class="toast-stack toast-stack--top-right" id="toast-container"></div>

<script>
const API = '';
let bots = {};
let selectedBot = null;
let currentRunId = null;
let pollInterval = null;
let logOffset = 0;
const ansiUp = new AnsiUp();

// ── Helpers ──────────────────────────────────────────────────

function stepOrders(delta) {
  const input = document.getElementById('orders-input');
  const current = parseInt(input.value) || 10;
  const next = Math.max(1, Math.min(999, current + delta));
  input.value = next;
}

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
}

function calcElapsed(start, end) {
  const s = Math.floor((new Date(end) - new Date(start)) / 1000);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s / 60)}m ${s % 60}s`;
}

function showToast(msg, type = 'info') {
  const iconMap = {
    success: '✓',
    error:   '✕',
    warning: '⚠',
    info:    'ℹ',
  };
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast--${type}`;
  el.innerHTML = `
    <div class="toast__icon">${iconMap[type] || 'ℹ'}</div>
    <div class="toast__body"><div class="toast__title">${msg}</div></div>
    <button class="toast__dismiss" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Init ─────────────────────────────────────────────────────

async function init() {
  await loadBots();
  await loadRuns();
  setInterval(loadRuns, 3000);
  setInterval(updateActiveCount, 2000);
}

// ── Bots ─────────────────────────────────────────────────────

async function loadBots() {
  try {
    const res = await fetch(`${API}/api/bots`);
    const data = await res.json();
    bots = {};
    data.forEach(b => bots[b.id] = b);
    renderBotGrid(data);
  } catch(e) {
    showToast('Error conectando con el servidor', 'error');
    document.getElementById('server-status').innerHTML = '<span class="badge__dot" style="background:var(--color-error-600)"></span> DESCONECTADO';
    document.getElementById('server-status').className = 'badge badge--error';
  }
}

function renderBotGrid(botList) {
  const grid = document.getElementById('bot-grid');
  grid.innerHTML = botList.map(bot => `
    <div class="bot-select-card ${bot.available ? '' : 'unavailable'}"
         id="card-${bot.id}"
         style="--card-color: ${bot.color}"
         onclick="${bot.available ? `selectBot('${bot.id}')` : ''}">
      <div class="bot-select-check" id="check-${bot.id}">✓</div>
      <div class="bot-select-icon">${bot.icon}</div>
      <div class="bot-select-name">${bot.name}</div>
      ${!bot.available ? `<div style="font-size:10px;color:var(--color-text-quaternary);margin-top:4px;font-family:var(--font-mono)">NO ENCONTRADO</div>` : ''}
    </div>
  `).join('');
}

function selectBot(botId) {
  selectedBot = botId;
  Object.keys(bots).forEach(id => {
    const card = document.getElementById(`card-${id}`);
    if (card) card.classList.toggle('selected', id === botId);
  });
  const btn = document.getElementById('launch-btn');
  btn.disabled = false;
  btn.style.background = bots[botId]?.color || '';
  btn.style.borderColor = bots[botId]?.color || '';
}

// ── Launch ────────────────────────────────────────────────────

async function launchBot() {
  if (!selectedBot) return;

  const orders = parseInt(document.getElementById('orders-input').value) || 10;
  const headless = true;

  const btn = document.getElementById('launch-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn__spinner"></span><span class="btn__label">INICIANDO...</span>';

  try {
    const res = await fetch(`${API}/api/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bot_id: selectedBot, orders, headless })
    });
    const data = await res.json();
    if (data.run_id) {
      showToast(`Bot iniciado — ID: ${data.run_id}`, 'success');
      await loadRuns();
      viewRun(data.run_id);
    } else {
      showToast(`Error: ${data.error}`, 'error');
    }
  } catch(e) {
    showToast('Error al iniciar el bot', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn__label">▶ INICIAR BOT</span>';
  }
}

// ── Runs ──────────────────────────────────────────────────────

async function loadRuns() {
  try {
    const res = await fetch(`${API}/api/runs`);
    const data = await res.json();
    renderRunsList(data.reverse());
    updateActiveCount(data);
  } catch(e) {}
}

function renderRunsList(runList) {
  const el = document.getElementById('runs-list');
  if (runList.length === 0) {
    el.innerHTML = '<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-quaternary);padding:8px 6px;">Sin ejecuciones aún</div>';
    return;
  }
  el.innerHTML = runList.map(r => `
    <div class="run-item ${r.id === currentRunId ? 'active' : ''}" onclick="viewRun('${r.id}')">
      <div class="run-status-dot dot-${r.status}"></div>
      <div class="run-item-info">
        <div class="run-item-name">${r.bot_icon} ${r.bot_name}</div>
        <div class="run-item-meta">${r.orders} pedidos · ${formatTime(r.started_at)}</div>
      </div>
    </div>
  `).join('');
}

function updateActiveCount(runList) {
  fetch(`${API}/api/runs`).then(r => r.json()).then(data => {
    const active = data.filter(r => r.status === 'running').length;
    document.getElementById('active-count').textContent = `${active} ACTIVOS`;
  }).catch(() => {});
}

// ── View Run ──────────────────────────────────────────────────

async function viewRun(runId) {
  currentRunId = runId;
  logOffset = 0;

  if (pollInterval) clearInterval(pollInterval);

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('active-run-view').style.display = 'flex';

  const res = await fetch(`${API}/api/runs/${runId}`);
  const run = await res.json();

  updateRunInfoBar(run);
  document.getElementById('terminal-title').textContent = run.command;
  document.getElementById('stop-btn').style.display = run.status === 'running' ? 'block' : 'none';

  document.getElementById('terminal-body').innerHTML = '';
  const logRes = await fetch(`${API}/api/runs/${runId}/logs`);
  const logData = await logRes.json();
  renderLogs(logData.logs);
  logOffset = logData.logs ? logData.logs.length : 0;
  scrollTerminal();

  if (run.status === 'running') {
    pollInterval = setInterval(() => pollLogs(runId), 800);
  }

  loadRuns();
}

async function pollLogs(runId) {
  try {
    const res = await fetch(`${API}/api/runs/${runId}/logs?offset=${logOffset}`);
    const data = await res.json();
    if (data.logs.length > 0) {
      renderLogs(data.logs);
      logOffset += data.logs.length;
      scrollTerminal();
    }
    if (data.status !== 'running') {
      clearInterval(pollInterval);
      const run = await (await fetch(`${API}/api/runs/${runId}`)).json();
      updateRunInfoBar(run);
      document.getElementById('stop-btn').style.display = 'none';
      loadRuns();
    }
  } catch(e) {}
}

function renderLogs(logs) {
  const body = document.getElementById('terminal-body');
  const empty = body.querySelector('.terminal-empty');
  if (empty) empty.remove();

  logs.forEach(log => {
    const div = document.createElement('div');
    div.className = 'log-line';
    let type = 'stdout';
    const t = log.text.toLowerCase();
    if (log.type === 'system') type = 'system';
    else if (log.type === 'error' || t.includes('error') || t.includes('traceback') || t.includes('exception')) type = 'error';
    else if (t.includes('warn') || t.includes('warning')) type = 'warn';
    div.innerHTML = `
      <span class="log-time">${log.time}</span>
      <span class="log-text ${type}">${ansiUp.ansi_to_html(log.text)}</span>
    `;
    body.appendChild(div);
  });
}

function updateRunInfoBar(run) {
  const bar = document.getElementById('run-info-bar');
  const elapsed = run.ended_at
    ? calcElapsed(run.started_at, run.ended_at)
    : calcElapsed(run.started_at, new Date().toISOString());
  bar.innerHTML = `
    <div class="run-info-field"><span class="run-info-key">ID</span><span class="run-info-val">${run.id}</span></div>
    <div class="run-info-field"><span class="run-info-key">BOT</span><span class="run-info-val">${run.bot_icon} ${run.bot_name}</span></div>
    <div class="run-info-field"><span class="run-info-key">ORDERS</span><span class="run-info-val">${run.orders}</span></div>
    <div class="run-info-field"><span class="run-info-key">TIEMPO</span><span class="run-info-val">${elapsed}</span></div>
    <div class="run-info-field"><span class="status-badge status-badge-${run.status}">${run.status.toUpperCase()}</span></div>
  `;
}

// ── Controls ──────────────────────────────────────────────────

async function stopCurrentRun() {
  if (!currentRunId) return;
  await fetch(`${API}/api/run/${currentRunId}/stop`, { method: 'POST' });
  showToast('Bot detenido', 'info');
  clearInterval(pollInterval);
  document.getElementById('stop-btn').style.display = 'none';
  loadRuns();
}

function clearTerminal() {
  document.getElementById('terminal-body').innerHTML = '';
}

function scrollTerminal() {
  const body = document.getElementById('terminal-body');
  body.scrollTop = body.scrollHeight;
}

// ── Theme ─────────────────────────────────────────────────────

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark-mode');
  document.getElementById('theme-toggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = '🌙';
    });
  }
})();

init();
</script>
</body>
</html>
